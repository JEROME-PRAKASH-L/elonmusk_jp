  <!-- body -->
  <text x="128" y="196" fill="#5ef2a0" font-size="22" font-weight="700">&gt;</text>
  <text x="160" y="196" fill="#8aa094" font-size="22">whoami</text>

  <text x="128" y="290" fill="#5ef2a0" font-size="78" font-weight="600" font-family="Spectral, Georgia, serif" font-style="italic">Jerome Prakash L</text>
  <text x="130" y="338" fill="#cbd8d0" font-size="26">Computer Science Engineering Student · Open to SWE / AI Internships</text>

  <!-- badges -->
