<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace">
  <!-- Social preview card (1200×630). Export to og-image.png, then uncomment the og:image
       tags in index.html. Open this file in a browser and screenshot at 1200×630, or run:
       (any SVG→PNG tool / online converter / `rsvg-convert og-image.svg -o og-image.png`). -->
  <defs>
    <radialGradient id="glow" cx="78%" cy="8%" r="60%">
      <stop offset="0%" stop-color="#5ef2a0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5ef2a0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#04070a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- terminal window -->
  <rect x="80" y="70" width="1040" height="490" rx="16" fill="#0a0f0e" stroke="#1b2a26" stroke-width="1.5"/>
  <!-- title bar -->
  <rect x="80" y="70" width="1040" height="52" rx="16" fill="#10171a"/>
  <rect x="80" y="104" width="1040" height="18" fill="#10171a"/>
  <circle cx="116" cy="96" r="7" fill="#ff5f56"/>
  <circle cx="140" cy="96" r="7" fill="#ffbd2e"/>
  <circle cx="164" cy="96" r="7" fill="#27c93f"/>
